<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in — Sig5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1a;--surface:#0c1628;--surface2:#111f35;--border:#1e3a5f;--accent:#38bdf8;--green:#34d399;--red:#f87171;--text:#f1f5f9;--text2:#94a3b8;--text3:#4a6080}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--bg)}
.logo-text{font-size:17px;font-weight:700;color:var(--text)}
.logo-text span{color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.icon{font-size:48px;margin-bottom:20px}
.title{font-size:22px;font-weight:700;margin-bottom:8px}
.sub{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:24px}

/* Spinner */
.spinner{width:40px;height:40px;border:3px solid rgba(56,189,248,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--red);margin-bottom:20px}
.btn{display:inline-block;background:var(--accent);color:var(--bg);font-weight:700;font-size:14px;padding:12px 28px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:12px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
  <a href="index.html" class="logo">
    <div class="logo-mark">S5</div>
    <span class="logo-text">SIG<span>5</span></span>
  </a>
  <div class="card" id="card">
    <div class="spinner"></div>
    <div class="title">Signing you in…</div>
    <div class="sub">Verifying your link, please wait.</div>
  </div>
</div>

<script>
const SENTRY = 'https://captain-filter.up.railway.app';

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <div class="icon">❌</div>
    <div class="title">Link invalid</div>
    <div class="error-box">${msg}</div>
    <a href="login.html" class="btn">Request a new link</a>`;
}

function showSuccess(email) {
  document.getElementById('card').innerHTML = `
    <div class="icon">✅</div>
    <div class="title">You're in!</div>
    <div class="sub">Signed in as <strong style="color:var(--accent)">${email}</strong><br>Redirecting you now…</div>`;
}

async function verify() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showError('No token found in link. Please request a new sign-in link.');
    return;
  }

  try {
    const r = await fetch(`${SENTRY}/subscriber/verify-magic-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await r.json();

    if (!r.ok || !data.success) {
      showError(data.error || 'Verification failed. Please request a new link.');
      return;
    }

    // Store credentials
    localStorage.setItem('sig5_token', data.token);
    localStorage.setItem('sig5_sub_id', data.subscriber_id);
    localStorage.setItem('sig5_email', data.email);

    showSuccess(data.email);

    // Redirect after short delay
    setTimeout(() => {
      window.location.href = data.setup_complete === false ? 'setup.html' : 'dashboard.html';
    }, 1200);

  } catch(e) {
    showError('Could not connect to server. Please try again.');
  }
}

verify();
</script>
</body>
</html>
