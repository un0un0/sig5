<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Sig5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1a;--surface:#0c1628;--surface2:#111f35;--border:#1e3a5f;--accent:#38bdf8;--accent2:#0ea5e9;--green:#34d399;--red:#f87171;--text:#f1f5f9;--text2:#94a3b8;--text3:#4a6080}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(56,189,248,.06);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:rgba(52,211,153,.04);bottom:0;left:-50px}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px;text-decoration:none}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--bg)}
.logo-text{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:40px;box-shadow:0 0 80px rgba(56,189,248,.05);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.login-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:8px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.forgot{display:block;text-align:right;font-size:12px;color:var(--text3);text-decoration:none;margin-top:6px;transition:color .2s}
.forgot:hover{color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:15px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--text3);font-weight:500}
.error-msg{display:none;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;text-align:center}
.back-link{display:block;text-align:center;margin-top:28px;font-size:13px;color:var(--text3);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--accent)}
.back-link span{color:var(--accent)}
.waitlist-note{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:10px;padding:14px 16px;margin-top:20px;font-size:12px;color:var(--text2);text-align:center;line-height:1.6}
.waitlist-note a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <a href="index.html" class="login-logo">
    <div class="logo-mark">S5</div>
    <span class="logo-text">SIG<span>5</span></span>
  </a>

  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your Sig5 subscriber dashboard</div>

    <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>
    </div>

    <button class="login-btn" onclick="handleLogin()">Sign In</button>

    <div class="waitlist-note">
      Not a subscriber yet? We're launching <strong>when the track record milestone is reached</strong>.<br>
      <a href="index.html#waitlist">Join the waitlist</a> to be notified when signups open.
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to <span>Sig5.io</span></a>
</div>

<script>
const SENTRY = 'https://sentry.up.railway.app';

async function handleLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!email) { errEl.textContent = 'Please enter your email address.'; errEl.style.display = 'block'; return; }

  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const r = await fetch(`${SENTRY}/subscriber/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await r.json();
    if (!r.ok || !data.success) {
      errEl.textContent = data.error || 'Login failed. Please try again.';
      errEl.style.display = 'block';
      btn.textContent = 'Sign In'; btn.disabled = false;
      return;
    }
    // Store token and redirect
    localStorage.setItem('sig5_token', data.token);
    window.location.href = data.setup_complete === false ? 'setup.html' : 'dashboard.html';
  } catch(e) {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.style.display = 'block';
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
